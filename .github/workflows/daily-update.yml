name: Daily Data Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate data
        run: |
          python3 src/main.py --mode demo
          
          # 生成 data.json
          python3 -c "
          import json
          from datetime import datetime
          import os
          
          data = {
              'update_time': datetime.now().strftime('%Y-%m-%d %H:%M'),
              'prices': [],
              'tenders': []
          }
          
          for f in sorted(os.listdir('data')):
              if f.startswith('prices_') and f.endswith('.json'):
                  with open(f'data/{f}', 'r') as fp:
                      data['prices'] = json.load(fp)
                      break
          
          for f in sorted(os.listdir('data')):
              if f.startswith('tenders_') and f.endswith('.json'):
                  with open(f'data/{f}', 'r') as fp:
                      data['tenders'] = json.load(fp)
                      break
          
          with open('web/data.json', 'w') as fp:
              json.dump(data, fp, ensure_ascii=False, indent=2)
          print('data.json generated')
          "

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --staged --quiet && echo "No changes" || git commit -m "🤖 Auto update: $(date +'%Y-%m-%d %H:%M')"
          git push
