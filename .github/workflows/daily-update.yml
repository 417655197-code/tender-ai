name: Daily Data Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate data
        run: |
          python3 -c "
          import json
          from datetime import datetime
          
          # 演示数据
          prices = [
              {'name': '废钢', 'market': '华东指数', 'price': 2215.4, 'change': -0.6, 'unit': '元/吨'},
              {'name': '废不锈钢', 'market': '华东', 'price': 9586, 'change': 91, 'unit': '元/吨'},
              {'name': '光亮铜', 'market': '全国', 'price': 88300, 'change': 200, 'unit': '元/吨'},
              {'name': '生铝', 'market': '全国', 'price': 19302, 'change': 70, 'unit': '元/吨'},
          ]
          
          tenders = [
              {'title': '温州市鹿城区城中村改造拆除工程', 'amount': '4800万', 'region': '温州市鹿城区', 'deadline': '2024-05-08'},
              {'title': '龙湾区工业园房屋征收拆除', 'amount': '2200万', 'region': '温州市龙湾区', 'deadline': '2024-04-30'},
              {'title': '瓯海区违法建筑强制拆除', 'amount': '680万', 'region': '温州市瓯海区', 'deadline': '2024-05-01'},
              {'title': '高铁新城棚户区改造拆除', 'amount': '3500万', 'region': '温州市瓯海区', 'deadline': '2024-05-15'},
          ]
          
          data = {
              'update_time': datetime.now().strftime('%Y-%m-%d %H:%M'),
              'prices': prices,
              'tenders': tenders
          }
          
          with open('web/data.json', 'w') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          
          print(f'Generated: {len(prices)} prices, {len(tenders)} tenders')
          "

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --staged --quiet && echo "No changes" || git commit -m "🤖 Auto update: $(date +'%Y-%m-%d %H:%M')"
          git push
